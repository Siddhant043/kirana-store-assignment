services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kirana
      POSTGRES_USER: kirana
      POSTGRES_PASSWORD: kirana
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirana -d kirana"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kirana:kirana@postgres:5432/kirana
    restart: unless-stopped

volumes:
  postgres_data:
